server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: kavya-portfolio-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:kavya_portfolio}
    username: ${DB_USERNAME:portfolio_user}
    password: ${DB_PASSWORD:change_me}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
